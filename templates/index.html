<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psoriasis Risk Scorer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 80px auto;
            padding: 0 20px;
            background: #f9f9f9;
            color: #333;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        p.subtitle {
            color: #666;
            margin-bottom: 40px;
        }
        .upload-box {
            background: white;
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
        }
        input[type="file"] {
            margin-bottom: 20px;
        }
        button {
            background: #2c7be5;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #1a5bbf;
        }
        .result {
            margin-top: 40px;
            background: white;
            border-radius: 8px;
            padding: 30px;
            display: none;
        }
        .probability {
            font-size: 48px;
            font-weight: bold;
            color: #2c7be5;
        }
        .label {
            font-size: 18px;
            margin-top: 10px;
            color: #444;
        }
        .disclaimer {
            margin-top: 40px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <h1>🧬 Psoriasis Risk Scorer</h1>
    <p class="subtitle">Upload a gene expression CSV file to get a psoriasis risk assessment.</p>

    <div class="upload-box">
        <input type="file" id="fileInput" accept=".csv">
        <br>
        <button onclick="analyze()">Analyze</button>
    </div>

    <div class="result" id="result">
        <div class="probability" id="probability"></div>
        <div class="label" id="label"></div>
    </div>

    <p class="disclaimer">⚠️ This tool is for research purposes only and is not a medical diagnosis.</p>

    <script>
        async function analyze() {
            const file = document.getElementById("fileInput").files[0];
            if (!file) {
                alert("Please upload a CSV file first!");
                return;
            }

            const formData = new FormData();
            formData.append("file", file);

            const response = await fetch("/analyze", {
                method: "POST",
                body: formData
            });

            const data = await response.json();

            document.getElementById("probability").textContent = data.probability + "%";
            document.getElementById("label").textContent = data.label;
            document.getElementById("result").style.display = "block";
        }
    </script>
</body>
</html>
